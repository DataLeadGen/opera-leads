<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Elements -->
  <rect width="600" height="400" fill="#F8F9FF" />
  
  <!-- Abstract Data Visualization Background -->
  <path d="M0 300 Q 150 200 300 250 T 600 150 V 400 H 0 Z" fill="url(#gradient1)" opacity="0.05"/>
  <path d="M0 350 Q 150 250 300 300 T 600 200 V 400 H 0 Z" fill="url(#gradient2)" opacity="0.08"/>
  
  <!-- Connection Lines -->
  <line x1="150" y1="150" x2="250" y2="90" stroke="#E6EAFF" stroke-width="2" />
  <line x1="250" y1="90" x2="320" y2="150" stroke="#E6EAFF" stroke-width="2" />
  <line x1="320" y1="150" x2="400" y2="90" stroke="#E6EAFF" stroke-width="2" />
  <line x1="400" y1="90" x2="500" y2="150" stroke="#E6EAFF" stroke-width="2" />
  <line x1="150" y1="150" x2="200" y2="250" stroke="#E6EAFF" stroke-width="2" />
  <line x1="320" y1="150" x2="270" y2="250" stroke="#E6EAFF" stroke-width="2" />
  <line x1="500" y1="150" x2="450" y2="250" stroke="#E6EAFF" stroke-width="2" />
  <line x1="200" y1="250" x2="270" y2="250" stroke="#E6EAFF" stroke-width="2" />
  <line x1="270" y1="250" x2="450" y2="250" stroke="#E6EAFF" stroke-width="2" />
  
  <!-- Data Nodes -->
  <circle cx="150" cy="150" r="15" fill="url(#gradientNode1)" />
  <circle cx="250" cy="90" r="12" fill="url(#gradientNode2)" />
  <circle cx="320" cy="150" r="15" fill="url(#gradientNode1)" />
  <circle cx="400" cy="90" r="12" fill="url(#gradientNode2)" />
  <circle cx="500" cy="150" r="15" fill="url(#gradientNode1)" />
  <circle cx="200" cy="250" r="12" fill="url(#gradientNode2)" />
  <circle cx="270" cy="250" r="15" fill="url(#gradientNode1)" />
  <circle cx="450" cy="250" r="12" fill="url(#gradientNode2)" />
  
  <!-- Glowing Effects -->
  <circle cx="150" cy="150" r="25" fill="url(#gradientGlow1)" opacity="0.2" />
  <circle cx="320" cy="150" r="25" fill="url(#gradientGlow1)" opacity="0.2" />
  <circle cx="500" cy="150" r="25" fill="url(#gradientGlow1)" opacity="0.2" />
  <circle cx="270" cy="250" r="25" fill="url(#gradientGlow1)" opacity="0.2" />
  
  <!-- Data Flow Animation Circles -->
  <circle cx="185" cy="130" r="4" fill="#6377EE">
    <animate attributeName="cx" from="150" to="250" dur="4s" begin="0s" repeatCount="indefinite" />
    <animate attributeName="cy" from="150" to="90" dur="4s" begin="0s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="350" cy="130" r="4" fill="#00DFD8">
    <animate attributeName="cx" from="320" to="400" dur="3s" begin="1s" repeatCount="indefinite" />
    <animate attributeName="cy" from="150" to="90" dur="3s" begin="1s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="235" cy="200" r="4" fill="#6377EE">
    <animate attributeName="cx" from="200" to="270" dur="3.5s" begin="0.5s" repeatCount="indefinite" />
    <animate attributeName="cy" from="250" to="250" dur="3.5s" begin="0.5s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="320" cy="200" r="4" fill="#00DFD8">
    <animate attributeName="cx" from="270" to="450" dur="5s" begin="0s" repeatCount="indefinite" />
    <animate attributeName="cy" from="250" to="250" dur="5s" begin="0s" repeatCount="indefinite" />
  </circle>
  
  <!-- Dashboard Elements -->
  <rect x="100" y="50" width="400" height="250" rx="15" fill="white" stroke="#E6EAFF" stroke-width="2" />
  <rect x="120" y="80" width="360" height="40" rx="8" fill="#F1F3F5" />
  <rect x="130" y="90" width="120" height="20" rx="4" fill="white" />
  <rect x="320" y="90" width="80" height="20" rx="4" fill="white" />
  <rect x="420" y="90" width="50" height="20" rx="4" fill="white" />
  
  <rect x="120" y="140" width="170" height="140" rx="8" fill="#F1F3F5" />
  <rect x="310" y="140" width="170" height="140" rx="8" fill="#F1F3F5" />
  
  <!-- Graph in Left Box -->
  <path d="M130 260 L 130 170 M 130 260 L 280 260" stroke="#D1D5DB" stroke-width="1" />
  <path d="M 130 240 L 150 220 L 170 230 L 190 200 L 210 210 L 230 180 L 250 190 L 270 170" 
        stroke="url(#gradientLine)" stroke-width="2" fill="none" stroke-linecap="round" />
  <circle cx="150" cy="220" r="4" fill="#6377EE" />
  <circle cx="170" cy="230" r="4" fill="#6377EE" />
  <circle cx="190" cy="200" r="4" fill="#6377EE" />
  <circle cx="210" cy="210" r="4" fill="#6377EE" />
  <circle cx="230" cy="180" r="4" fill="#6377EE" />
  <circle cx="250" cy="190" r="4" fill="#6377EE" />
  <circle cx="270" cy="170" r="4" fill="#6377EE" />
  
  <!-- Donut Chart in Right Box -->
  <circle cx="395" cy="210" r="50" fill="#F1F3F5" />
  <path d="M 395 210 L 395 160 A 50 50 0 0 1 439 235 Z" fill="#6377EE" />
  <path d="M 395 210 L 439 235 A 50 50 0 0 1 395 260 Z" fill="#00DFD8" />
  <path d="M 395 210 L 395 260 A 50 50 0 1 1 395 160 Z" fill="#E6EAFF" />
  <circle cx="395" cy="210" r="30" fill="white" />
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6377EE" />
      <stop offset="100%" stop-color="#00DFD8" />
    </linearGradient>
    
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00DFD8" />
      <stop offset="100%" stop-color="#6377EE" />
    </linearGradient>
    
    <linearGradient id="gradientNode1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6377EE" />
      <stop offset="100%" stop-color="#5163D6" />
    </linearGradient>
    
    <linearGradient id="gradientNode2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00DFD8" />
      <stop offset="100%" stop-color="#00BCB6" />
    </linearGradient>
    
    <radialGradient id="gradientGlow1" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#6377EE" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6377EE" stop-opacity="0"/>
    </radialGradient>
    
    <linearGradient id="gradientLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6377EE" />
      <stop offset="100%" stop-color="#00DFD8" />
    </linearGradient>
  </defs>
</svg>